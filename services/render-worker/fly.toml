# Fly.io deploy — clickthru render-worker.  `fly launch --no-deploy` ile app adını oluştur,
# sonra `fly deploy`. (Railway/Render için Dockerfile yeterli — bu dosyayı yok say.)
app = "clickthru-render"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

# RENDER_SECRET'i panelden gizli olarak ekle:  fly secrets set RENDER_SECRET=...
